<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background wall -->
  <rect width="400" height="300" fill="#f5e6d3"/>
  
  <!-- Window -->
  <rect x="30" y="20" width="120" height="100" fill="#e0f7ff" stroke="#4f46e5" stroke-width="3" rx="4"/>
  <line x1="90" y1="20" x2="90" y2="120" stroke="#4f46e5" stroke-width="2"/>
  <line x1="30" y1="70" x2="150" y2="70" stroke="#4f46e5" stroke-width="2"/>
  <!-- Sky and buildings through window -->
  <rect x="35" y="25" width="55" height="45" fill="#87ceeb"/>
  <rect x="95" y="25" width="50" height="45" fill="#87ceeb"/>
  <rect x="35" y="70" width="55" height="45" fill="#deb887"/>
  <rect x="95" y="70" width="50" height="45" fill="#deb887"/>
  
  <!-- Door -->
  <rect x="280" y="140" width="80" height="140" fill="#d4a574" stroke="#8b6914" stroke-width="2" rx="4"/>
  <circle cx="355" cy="210" r="4" fill="#ffd700"/>
  
  <!-- Bed -->
  <rect x="20" y="150" width="150" height="90" fill="#e8d5c4" stroke="#8b6914" stroke-width="3" rx="6"/>
  <!-- Pillows -->
  <rect x="30" y="155" width="50" height="35" fill="#fff8dc" stroke="#d3d3d3" stroke-width="2" rx="4"/>
  <rect x="90" y="155" width="50" height="35" fill="#fff8dc" stroke="#d3d3d3" stroke-width="2" rx="4"/>
  <!-- Blanket -->
  <rect x="30" y="195" width="120" height="40" fill="#add8e6"/>
  
  <!-- Nightstand -->
  <rect x="170" y="160" width="50" height="50" fill="#d4a574" stroke="#8b6914" stroke-width="2" rx="3"/>
  <circle cx="197" cy="165" r="8" fill="#ffd700"/>
  
  <!-- Desk -->
  <rect x="210" y="200" width="60" height="40" fill="#a0826d" stroke="#8b6914" stroke-width="2"/>
  <rect x="210" y="242" width="20" height="88" fill="#8b6914"/>
  
  <!-- TV -->
  <rect x="280" y="60" width="100" height="60" fill="#1a1a1a" stroke="#333" stroke-width="2" rx="4"/>
  <rect x="290" y="70" width="80" height="40" fill="#4fc3f7"/>
  <!-- TV stand -->
  <rect x="305" y="125" width="20" height="25" fill="#8b6914"/>
  
  <!-- Sofa -->
  <ellipse cx="120" cy="270" rx="60" ry="20" fill="#8b4513" stroke="#654321" stroke-width="2"/>
  
  <!-- Bathroom door indication -->
  <rect x="290" y="100" width="2" height="35" fill="#8b6914" stroke-width="1"/>
  
  <!-- Light fixture on ceiling -->
  <circle cx="200" cy="15" r="12" fill="#ffd700" stroke="#daa520" stroke-width="2"/>
  <line x1="200" y1="27" x2="200" y2="35" stroke="#8b7355" stroke-width="2"/>
</svg>