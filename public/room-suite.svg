<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background - luxury gradient -->
  <defs>
    <linearGradient id="suiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5deb3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe8c6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#suiteGrad)"/>
  
  <!-- Luxury gold trim -->
  <rect x="0" y="0" width="400" height="6" fill="#daa520"/>
  
  <!-- Large panoramic windows (Suite feature) -->
  <rect x="15" y="15" width="90" height="130" fill="#87ceeb" stroke="#4f46e5" stroke-width="3" rx="6"/>
  <rect x="115" y="15" width="90" height="130" fill="#87ceeb" stroke="#4f46e5" stroke-width="3" rx="6"/>
  <!-- Window details -->
  <line x1="60" y1="15" x2="60" y2="145" stroke="#4f46e5" stroke-width="2"/>
  <line x1="160" y1="15" x2="160" y2="145" stroke="#4f46e5" stroke-width="2"/>
  <line x1="15" y1="80" x2="105" y2="80" stroke="#4f46e5" stroke-width="1" opacity="0.5"/>
  <line x1="115" y1="80" x2="205" y2="80" stroke="#4f46e5" stroke-width="1" opacity="0.5"/>
  <!-- City skyline through windows -->
  <rect x="20" y="20" width="35" height="50" fill="#1a1a1a"/>
  <rect x="70" y="30" width="30" height="40" fill="#2a2a2a"/>
  <circle cx="35" cy="25" r="4" fill="#ffff00" opacity="0.7"/>
  <circle cx="75" cy="35" r="3" fill="#ffff00" opacity="0.7"/>
  <rect x="120" y="20" width="35" height="55" fill="#1a1a1a"/>
  <rect x="170" y="25" width="30" height="50" fill="#2a2a2a"/>
  <circle cx="135" cy="28" r="4" fill="#ffff00" opacity="0.7"/>
  <circle cx="180" cy="40" r="3" fill="#ffff00" opacity="0.7"/>
  
  <!-- Master bedroom with king bed -->
  <rect x="15" y="165" width="190" height="110" fill="#e8d5c4" stroke="#8b6914" stroke-width="4" rx="10"/>
  <!-- Premium headboard with padding -->
  <rect x="10" y="160" width="200" height="16" fill="#8b6914" rx="8"/>
  <!-- Decorative wall paneling -->
  <line x1="15" y1="155" x2="205" y2="155" stroke="#daa520" stroke-width="2" opacity="0.6"/>
  <!-- Luxury bedding -->
  <rect x="25" y="175" width="75" height="45" fill="#fff8dc" stroke="#d3d3d3" stroke-width="2" rx="6"/>
  <rect x="110" y="175" width="75" height="45" fill="#fff8dc" stroke="#d3d3d3" stroke-width="2" rx="6"/>
  <!-- High-thread-count blanket -->
  <path d="M 25 225 L 25 265 L 195 265 L 195 220" fill="#e0c8c8" stroke="#8b7355" stroke-width="2"/>
  <!-- Decorative throw -->
  <polygon points="80,240 120,240 100,270" fill="#ffb6c1" opacity="0.7"/>
  
  <!-- Luxury side tables with decorative items -->
  <rect x="215" y="170" width="50" height="60" fill="#d4a574" stroke="#8b6914" stroke-width="2" rx="4"/>
  <rect x="280" y="170" width="50" height="60" fill="#d4a574" stroke="#8b6914" stroke-width="2" rx="4"/>
  <!-- Lamps with warm glow -->
  <circle cx="240" cy="165" r="7" fill="#ffd700" opacity="0.9"/>
  <rect x="237" y="172" width="6" height="15" fill="#8b7355"/>
  <circle cx="305" cy="165" r="7" fill="#ffd700" opacity="0.9"/>
  <rect x="302" y="172" width="6" height="15" fill="#8b7355"/>
  <!-- Decorative items on nightstands -->
  <circle cx="235" cy="195" r="4" fill="#ff69b4"/>
  <circle cx="310" cy="195" r="4" fill="#ff69b4"/>
  
  <!-- Living area - sofa -->
  <rect x="215" y="245" width="115" height="45" fill="#8b4513" stroke="#654321" stroke-width="2" rx="6"/>
  <!-- Sofa details -->
  <line x1="240" y1="245" x2="240" y2="290" stroke="#654321" stroke-width="1" opacity="0.5"/>
  <line x1="270" y1="245" x2="270" y2="290" stroke="#654321" stroke-width="1" opacity="0.5"/>
  <line x1="300" y1="245" x2="300" y2="290" stroke="#654321" stroke-width="1" opacity="0.5"/>
  
  <!-- Spa bathroom entrance (Suite feature) -->
  <rect x="330" y="160" width="60" height="140" fill="#f0f8ff" stroke="#06b6d4" stroke-width="2" rx="4"/>
  <!-- Gold accents in bathroom -->
  <rect x="335" y="165" width="50" height="3" fill="#daa520"/>
  <!-- Jacuzzi tub indication -->
  <circle cx="360" cy="210" r="18" fill="#add8e6" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
  
  <!-- Ceiling fixture - chandelier -->
  <circle cx="200" cy="10" r="15" fill="#ffd700" stroke="#daa520" stroke-width="2"/>
  <line x1="200" y1="25" x2="200" y2="35" stroke="#8b7355" stroke-width="2"/>
  <circle cx="180" cy="35" r="3" fill="#ffd700"/>
  <circle cx="220" cy="35" r="3" fill="#ffd700"/>
  <circle cx="200" cy="45" r="2" fill="#ffd700"/>
</svg>