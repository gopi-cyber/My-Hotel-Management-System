<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="roomGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bae6fd;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="200" fill="url(#roomGrad)"/>
  
  <!-- Room illustration -->
  <g id="deluxe-room">
    <!-- Wall -->
    <rect x="20" y="30" width="260" height="140" fill="#f5e6d3" stroke="#d4a574" stroke-width="2" rx="8"/>
    
    <!-- Window with view -->
    <rect x="180" y="50" width="60" height="50" fill="#87ceeb" stroke="#4a90e2" stroke-width="2" rx="4"/>
    <line x1="210" y1="50" x2="210" y2="100" stroke="#4a90e2" stroke-width="1"/>
    <line x1="180" y1="75" x2="240" y2="75" stroke="#4a90e2" stroke-width="1"/>
    
    <!-- Mountain view in window -->
    <polygon points="185,85 200,65 215,80 230,70 235,95" fill="#90ee90" opacity="0.7"/>
    
    <!-- Bed -->
    <rect x="30" y="95" width="120" height="60" fill="#ffb6c1" stroke="#ff69b4" stroke-width="2" rx="4"/>
    <rect x="35" y="100" width="110" height="50" fill="#ffc0cb" rx="3"/>
    
    <!-- Pillow -->
    <rect x="130" y="100" width="15" height="30" fill="#fff" stroke="#ddd" stroke-width="1" rx="2"/>
    
    <!-- Nightstand -->
    <rect x="155" y="105" width="20" height="40" fill="#8b7355" stroke="#654321" stroke-width="1" rx="2"/>
    <circle cx="165" cy="110" r="3" fill="#ffd700"/>
    
    <!-- Lamp -->
    <rect x="162" y="75" width="2" height="30" fill="#333"/>
    <circle cx="163" cy="75" r="8" fill="#ffcc00" stroke="#ff9800" stroke-width="1"/>
  </g>
  
  <!-- Rating stars -->
  <g id="stars">
    <text x="40" y="175" font-size="24" fill="#ffd700">★★★★★</text>
  </g>
</svg>