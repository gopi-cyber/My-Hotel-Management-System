<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky gradient background -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bae6fd;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#skyGradient)"/>
  
  <!-- Hotel Building -->
  <g id="hotel">
    <!-- Building body -->
    <rect x="300" y="150" width="600" height="350" fill="#f5deb3" stroke="#d4a574" stroke-width="2"/>
    
    <!-- Roof -->
    <polygon points="300,150 600,50 900,150" fill="#8b4513" stroke="#654321" stroke-width="2"/>
    
    <!-- Door entrance -->
    <rect x="570" y="450" width="60" height="100" fill="#654321" stroke="#3d2817" stroke-width="2"/>
    <circle cx="625" cy="500" r="4" fill="#ffd700"/>
    
    <!-- Windows - Floor 1 -->
    <rect x="320" y="200" width="40" height="40" fill="#87ceeb" stroke="#4a90e2" stroke-width="1"/>
    <line x1="340" y1="200" x2="340" y2="240" stroke="#4a90e2" stroke-width="1"/>
    <line x1="320" y1="220" x2="360" y2="220" stroke="#4a90e2" stroke-width="1"/>
    
    <rect x="410" y="200" width="40" height="40" fill="#87ceeb" stroke="#4a90e2" stroke-width="1"/>
    <line x1="430" y1="200" x2="430" y2="240" stroke="#4a90e2" stroke-width="1"/>
    <line x1="410" y1="220" x2="450" y2="220" stroke="#4a90e2" stroke-width="1"/>
    
    <rect x="500" y="200" width="40" height="40" fill="#87ceeb" stroke="#4a90e2" stroke-width="1"/>
    <line x1="520" y1="200" x2="520" y2="240" stroke="#4a90e2" stroke-width="1"/>
    <line x1="500" y1="220" x2="540" y2="220" stroke="#4a90e2" stroke-width="1"/>
    
    <rect x="590" y="200" width="40" height="40" fill="#87ceeb" stroke="#4a90e2" stroke-width="1"/>
    <line x1="610" y1="200" x2="610" y2="240" stroke="#4a90e2" stroke-width="1"/>
    <line x1="590" y1="220" x2="630" y2="220" stroke="#4a90e2" stroke-width="1"/>
    
    <rect x="680" y="200" width="40" height="40" fill="#87ceeb" stroke="#4a90e2" stroke-width="1"/>
    <line x1="700" y1="200" x2="700" y2="240" stroke="#4a90e2" stroke-width="1"/>
    <line x1="680" y1="220" x2="720" y2="220" stroke="#4a90e2" stroke-width="1"/>
    
    <rect x="770" y="200" width="40" height="40" fill="#87ceeb" stroke="#4a90e2" stroke-width="1"/>
    <line x1="790" y1="200" x2="790" y2="240" stroke="#4a90e2" stroke-width="1"/>
    <line x1="770" y1="220" x2="810" y2="220" stroke="#4a90e2" stroke-width="1"/>
    
    <!-- Windows - Floor 2 -->
    <rect x="320" y="290" width="40" height="40" fill="#87ceeb" stroke="#4a90e2" stroke-width="1"/>
    <rect x="410" y="290" width="40" height="40" fill="#87ceeb" stroke="#4a90e2" stroke-width="1"/>
    <rect x="500" y="290" width="40" height="40" fill="#87ceeb" stroke="#4a90e2" stroke-width="1"/>
    <rect x="590" y="290" width="40" height="40" fill="#87ceeb" stroke="#4a90e2" stroke-width="1"/>
    <rect x="680" y="290" width="40" height="40" fill="#87ceeb" stroke="#4a90e2" stroke-width="1"/>
    <rect x="770" y="290" width="40" height="40" fill="#87ceeb" stroke="#4a90e2" stroke-width="1"/>
    
    <!-- Windows - Floor 3 -->
    <rect x="320" y="380" width="40" height="40" fill="#87ceeb" stroke="#4a90e2" stroke-width="1"/>
    <rect x="410" y="380" width="40" height="40" fill="#87ceeb" stroke="#4a90e2" stroke-width="1"/>
    <rect x="500" y="380" width="40" height="40" fill="#87ceeb" stroke="#4a90e2" stroke-width="1"/>
    <rect x="590" y="380" width="40" height="40" fill="#87ceeb" stroke="#4a90e2" stroke-width="1"/>
    <rect x="680" y="380" width="40" height="40" fill="#87ceeb" stroke="#4a90e2" stroke-width="1"/>
    <rect x="770" y="380" width="40" height="40" fill="#87ceeb" stroke="#4a90e2" stroke-width="1"/>
    
    <!-- Flag -->
    <rect x="590" y="35" width="20" height="15" fill="#ff6b6b" stroke="#c92a2a" stroke-width="1"/>
    <rect x="591" y="48" width="18" height="8" fill="#3d3d3d"/>
  </g>
  
  <!-- Clouds -->
  <g id="clouds">
    <ellipse cx="100" cy="80" rx="60" ry="30" fill="#ffffff" opacity="0.8"/>
    <ellipse cx="150" cy="85" rx="50" ry="25" fill="#ffffff" opacity="0.8"/>
    
    <ellipse cx="1000" cy="120" rx="70" ry="35" fill="#ffffff" opacity="0.8"/>
    <ellipse cx="1070" cy="125" rx="60" ry="30" fill="#ffffff" opacity="0.8"/>
  </g>
  
  <!-- Ground -->
  <ellipse cx="600" cy="550" rx="500" ry="80" fill="#90ee90" opacity="0.6"/>
  
  <!-- Text -->
  <text x="600" y="560" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">
    Professional Hotel Management System
  </text>
</svg>